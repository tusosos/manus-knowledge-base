name: Check Links

on:
  schedule:
    - cron: '0 6 * * 1'
  pull_request:
    paths:
      - '**/*.tsx'
      - 'scripts/src/check-links.ts'
      - '.github/workflows/check-links.yml'
  workflow_dispatch:

jobs:
  check-links:
    name: Validate links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run link validator
        id: check_links
        run: pnpm check:links

      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- check-links-auto-issue -->';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const already = existing.data.find(
              (i) => !i.pull_request && i.body && i.body.includes(marker)
            );
            const body = [
              marker,
              `The scheduled \`pnpm check:links\` run failed.`,
              ``,
              `Latest failing run: ${runUrl}`,
            ].join('\n');
            if (already) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: already.number,
                body: `Another scheduled run failed: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Link validator failed on ${new Date().toISOString().slice(0, 10)}`,
                body,
              });
            }
